name: Dependabot PR actions

on:
  pull_request_target:

jobs:
  dependabot:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: write
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}

    steps:
      - name: GitHub App token
        id: github_app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3
        with:
          github-token: ${{ steps.github_app_token.outputs.token }}

      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          token: ${{ steps.github_app_token.outputs.token }}
          ref: ${{ github.head_ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: 21
          distribution: temurin

      - name: Update Gradle SHAs
        run: ./gradlew updateSHAs

      - name: Commit SHA changes
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7
        with:
          commit_message: Updating SHAs
          branch: ${{ github.head_ref }}
          commit_user_name: dependabot[bot]
          commit_user_email: support@github.com
          commit_options: '--signoff'

      - name: Run spotless
        run: ./gradlew spotlessApply

      - name: Commit spotless changes
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7
        with:
          commit_message: Spotless formatting
          branch: ${{ github.head_ref }}
          commit_user_name: dependabot[bot]
          commit_user_email: support@github.com
          commit_options: '--signoff'

      - name: Add skip-changelog label
        run: gh pr edit "${{ github.event.pull_request.html_url }}" --add-label "skip-changelog"
        env:
          GITHUB_TOKEN: ${{ steps.github_app_token.outputs.token }}
