resource_types:
  sample-resource:
      sample_read_only:
        default: true
        allowed_actions:
          - "sampleresource:get"

      sample_read_write:
        allowed_actions:
          - "sampleresource:*"

      sample_full_access:
        allowed_actions:
          - "sampleresource:*"
          - "cluster:admin/security/resource/share"
  sample-resource-group:
    sample_group_read_only:
      default: true
      allowed_actions:
        # TODO: can sample-resource access levels be referenced here? i.e. sample_read_only
        - "sampleresourcegroup:get"

    sample_group_read_write:
      allowed_actions:
        - "sampleresourcegroup:*"

    sample_group_full_access:
      allowed_actions:
        - "sampleresourcegroup:*"
        - "cluster:admin/security/resource/share"
